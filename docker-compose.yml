services:
  openbao:
    image: hashicorp/vault:1.15
    container_name: flume-openbao
    depends_on:
      elasticsearch:
        condition: service_healthy
    command: server -config=/vault/config/openbao.json
    environment:
      - VAULT_API_ADDR=http://127.0.0.1:8200
    ports:
      - "${VAULT_PORT:-8200}:8200"
    cap_add:
      - IPC_LOCK
    volumes:
      - openbao_data:/vault/file
      - ./config:/vault/config:ro
    healthcheck:
      test: ["CMD", "vault", "status", "-address=http://127.0.0.1:8200"]
      interval: 10s
      timeout: 5s
      retries: 5

  bootstrap:
    image: hashicorp/vault:1.15
    container_name: flume-bootstrap
    depends_on:
      openbao:
        condition: service_started
    environment:
      - VAULT_ADDR=http://openbao:8200
      - VAULT_TOKEN=flume-dev-token
    volumes:
      - .:/app
      - openbao_data:/vault/file
    entrypoint: ["/bin/sh", "/app/bootstrap.sh"]

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: flume-elasticsearch
    depends_on:
      bootstrap:
        condition: service_completed_successfully
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "cluster.routing.allocation.disk.threshold_enabled=false"
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "${ES_PORT:-9200}:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -v '\"status\":\"red\"' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: flume-dashboard
    depends_on:
      elasticsearch:
        condition: service_healthy
      openbao:
        condition: service_healthy
      bootstrap:
        condition: service_completed_successfully
    volumes:
      - .:/app
    ports:
      - "${DASHBOARD_PORT:-8765}:8765"
    environment:
      - FLUME_CONFIG=/app/config.toml
      - PYTHONPATH=/app/src
      - UV_PROJECT_ENVIRONMENT=/opt/venv
      - FLUME_WORKSPACE=/workspace
      - LOCAL_EXO_BASE_URL=${LOCAL_EXO_BASE_URL:-http://host.docker.internal:52415/v1}
      - LOCAL_OLLAMA_BASE_URL=${LOCAL_OLLAMA_BASE_URL:-http://host.docker.internal:11434/v1}
      - FLUME_AUTO_START_WORKERS=${FLUME_AUTO_START_WORKERS:-1}
    command:
      - /bin/bash
      - -c
      - |
        set -euo pipefail
        if [ ! -d /app/src/frontend/dist ] || [ ! -f /app/src/frontend/dist/index.html ]; then
          echo "Flume UI dist missing; restoring from multi-stage Docker cache..."
          mkdir -p /app/src/frontend/dist
          cp -R /dist-cache/* /app/src/frontend/dist/
        fi
        cd /app
        exec uv run python src/dashboard/server.py
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:8765/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      elasticsearch:
        condition: service_healthy
      openbao:
        condition: service_healthy
      bootstrap:
        condition: service_completed_successfully
    volumes:
      - .:/app
      - ..:/workspace
    environment:
      - FLUME_CONFIG=/app/config.toml
      - PYTHONPATH=/app/src
      - UV_PROJECT_ENVIRONMENT=/opt/venv
      - FLUME_WORKSPACE=/workspace
      - LOCAL_EXO_BASE_URL=${LOCAL_EXO_BASE_URL:-http://host.docker.internal:52415/v1}
      - LOCAL_OLLAMA_BASE_URL=${LOCAL_OLLAMA_BASE_URL:-http://host.docker.internal:11434/v1}
    command: ["uv", "run", "python", "src/worker-manager/manager.py"]
    deploy:
      mode: replicated
      replicas: 2
    healthcheck:
      test: ["CMD-SHELL", "ps -ef | grep manager.py || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  es_data:
  openbao_data:
