services:
  openbao:
    image: hashicorp/vault:1.15
    container_name: flume-openbao
    depends_on:
      elasticsearch:
        condition: service_healthy
        required: false
    command: server
    environment:
      - VAULT_API_ADDR=http://127.0.0.1:8200
    ports:
      - "${VAULT_PORT:-8200}:8200"
    cap_add:
      - IPC_LOCK
    volumes:
      - openbao_data:/vault/file
      - ./config:/vault/config:ro
    healthcheck:
      test: ["CMD-SHELL", "vault status -address=http://127.0.0.1:8200 >/dev/null 2>&1; rc=$$?; if [ $$rc -eq 0 ] || [ $$rc -eq 2 ]; then exit 0; else exit 1; fi"]
      interval: 10s
      timeout: 5s
      retries: 5
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: flume-elasticsearch
    profiles: ["managed_elastic"]
    environment:
      - discovery.type=single-node
      # DEVELOPMENT ISOLATION TOPOLOGY: Single-node container domains disable xpack.security natively bypassing volatile self-signed certificate overheads natively.
      - xpack.security.enabled=false
      - "cluster.routing.allocation.disk.threshold_enabled=false"
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "${ES_PORT:-9200}:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -E '\"status\":\"(green|yellow)\"' > /dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  gateway:
    build:
      context: .
      dockerfile: src/gateway/Dockerfile
    container_name: flume-gateway
    depends_on:
      elasticsearch:
        condition: service_healthy
        required: false
      openbao:
        condition: service_healthy
    ports:
      - "${GATEWAY_PORT:-8090}:8090"
    extra_hosts:
      - "${LOCAL_LLM_HOST:-host.docker.internal}:host-gateway"
    environment:
      - ES_URL=http://elasticsearch:9200
      - OPENBAO_ADDR=http://openbao:8200
      - OPENBAO_TOKEN=${OPENBAO_TOKEN}
      - OLLAMA_BASE_URL=${LOCAL_OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - FLUME_GATEWAY_LOG_LEVEL=${FLUME_GATEWAY_LOG_LEVEL:-info}
      - FLUME_OLLAMA_NUM_CTX
      - LLM_PROVIDER
      - LLM_BASE_URL
      - LLM_API_KEY
      - LLM_MODEL
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8090/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: flume-dashboard
    depends_on:
      elasticsearch:
        condition: service_healthy
        required: false
      openbao:
        condition: service_healthy
      gateway:
        condition: service_healthy
      worker:
        condition: service_healthy
    volumes:
      - .:/app
      # AP-15: Replaced ..:/workspace (exposed entire host parent dir) with a
      # scoped read-only mount for local-path projects only.
      # Set FLUME_LOCAL_REPOS_PATH to the directory containing your local repos.
      # Remote/indexed projects need no mount — AP-11 routes clones to /tmp.
      - ${FLUME_LOCAL_REPOS_PATH:-/dev/null}:/local-repos:ro
      # Mount host SSH keys read-only so the dashboard can clone SSH remotes.
      # The container user runs as root; adjust source path if using a non-root host user.
      - ${FLUME_SSH_DIR:-~/.ssh}:/root/.ssh:ro
    ports:
      - "${DASHBOARD_PORT:-8765}:8765"
    extra_hosts:
      - "${LOCAL_LLM_HOST:-host.docker.internal}:host-gateway"
    environment:
      - FLUME_CONFIG=/app/config.toml
      - PYTHONPATH=/app/src
      - UV_PROJECT_ENVIRONMENT=/opt/venv
      - FLUME_WORKSPACE=/local-repos
      - LOCAL_EXO_BASE_URL=${LOCAL_EXO_BASE_URL:-http://host.docker.internal:52415/v1}
      - LOCAL_OLLAMA_BASE_URL=${LOCAL_OLLAMA_BASE_URL:-http://host.docker.internal:11434/v1}
      - FLUME_AUTO_START_WORKERS=${FLUME_AUTO_START_WORKERS:-1}
      - VAULT_ROLE_ID=flume-client-role
      - VAULT_SECRET_ID=${BAO_SECRET_ID:-flume-client-secret}
      - OPENBAO_TOKEN=${OPENBAO_TOKEN}
      - FLUME_ADMIN_TOKEN
      - LLM_PROVIDER
      - LLM_BASE_URL
      - LLM_HOST
      - LLM_API_KEY
      - LLM_MODEL
      # Ollama thinking-model controls (see utils/llm_client.py)
      # FLUME_OLLAMA_THINK=1  → enable chain-of-thought for gemma/qwq (default: disabled)
      # FLUME_OLLAMA_NUM_CTX  → override Ollama context window (default: 8192)
      # FLUME_PLANNER_MODEL   → use a faster model for planning (e.g. qwen2.5-coder:7b)
      #                         while agents use the main LLM_MODEL for code tasks
      - FLUME_OLLAMA_THINK
      - FLUME_OLLAMA_NUM_CTX
      - FLUME_PLANNER_MODEL
      - FLUME_ES_URL
      - GITHUB_TOKEN
      - ADO_ORGANIZATION
      - ADO_PROJECT
      - ADO_PERSONAL_ACCESS_TOKEN
      - FLUME_GATEWAY_URL=http://gateway:8090
    command:
      - /bin/bash
      - -c
      - |
        set -euo pipefail
        if [ ! -d /app/src/frontend/dist ] || [ ! -f /app/src/frontend/dist/index.html ]; then
          echo "Flume UI dist missing; restoring from multi-stage Docker cache..."
          mkdir -p /app/src/frontend/dist
          cp -R /dist-cache/* /app/src/frontend/dist/
        fi
        # Set up a writable SSH workspace. /root/.ssh is mounted :ro from the host
        # so we cannot chmod it or write known_hosts there. Instead we write
        # known_hosts to /tmp and export GIT_SSH_COMMAND so all git operations
        # inside this container use the correct config non-interactively.
        mkdir -p /tmp/flume_ssh
        ssh-keyscan -H github.com ssh.dev.azure.com dev.azure.com gitlab.com bitbucket.org \
          >> /tmp/flume_ssh/known_hosts 2>/dev/null || true
        export GIT_SSH_COMMAND="ssh -o UserKnownHostsFile=/tmp/flume_ssh/known_hosts \
          -o StrictHostKeyChecking=accept-new \
          -o BatchMode=yes \
          -o ConnectTimeout=15"
        cd /app
        exec /opt/venv/bin/python src/dashboard/server.py
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:8765/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      elasticsearch:
        condition: service_healthy
        required: false
      openbao:
        condition: service_healthy
      gateway:
        condition: service_healthy
    volumes:
      - .:/app
      # AP-15: Scoped read-only mount for local-path projects only (replaces ..:/workspace).
      - ${FLUME_LOCAL_REPOS_PATH:-/dev/null}:/local-repos:ro
      # Mount host SSH keys read-only so workers can clone/push SSH remotes.
      - ${FLUME_SSH_DIR:-~/.ssh}:/root/.ssh:ro
    extra_hosts:
      - "${LOCAL_LLM_HOST:-host.docker.internal}:host-gateway"
    environment:
      - FLUME_CONFIG=/app/config.toml
      - PYTHONPATH=/app/src
      - UV_PROJECT_ENVIRONMENT=/opt/venv
      - FLUME_WORKSPACE=/local-repos
      - LOCAL_EXO_BASE_URL=${LOCAL_EXO_BASE_URL:-http://host.docker.internal:52415/v1}
      - LOCAL_OLLAMA_BASE_URL=${LOCAL_OLLAMA_BASE_URL:-http://host.docker.internal:11434/v1}
      - VAULT_ROLE_ID=flume-client-role
      - VAULT_SECRET_ID=${BAO_SECRET_ID:-flume-client-secret}
      - OPENBAO_TOKEN=${OPENBAO_TOKEN}
      - FLUME_ADMIN_TOKEN
      - LLM_PROVIDER
      - LLM_BASE_URL
      - LLM_HOST
      - LLM_API_KEY
      - LLM_MODEL
      # Ollama thinking-model controls (see utils/llm_client.py)
      - FLUME_OLLAMA_THINK
      - FLUME_OLLAMA_NUM_CTX
      - FLUME_ES_URL
      - GITHUB_TOKEN
      - ADO_ORGANIZATION
      - ADO_PROJECT
      - ADO_PERSONAL_ACCESS_TOKEN
      - FLUME_GATEWAY_URL=http://gateway:8090
    command: ["/opt/venv/bin/python", "src/worker-manager/manager.py"]
    deploy:
      mode: replicated
      replicas: 2
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  es_data:
  openbao_data:
