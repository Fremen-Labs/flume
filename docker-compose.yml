version: "3.8"

services:
  openbao:
    image: quay.io/openbao/openbao:latest
    container_name: flume-openbao
    environment:
      - BAO_DEV_ROOT_TOKEN_ID=flume-dev-token
      - BAO_DEV_LISTEN_ADDRESS=0.0.0.0:8200
    ports:
      - "8200:8200"
    cap_add:
      - IPC_LOCK
    volumes:
      - openbao_data:/vault/file
    healthcheck:
      test: ["CMD", "bao", "status", "-address=http://127.0.0.1:8200"]
      interval: 10s
      timeout: 5s
      retries: 5

  bootstrap:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: flume-bootstrap
    depends_on:
      openbao:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    environment:
      - VAULT_ADDR=http://openbao:8200
      - VAULT_TOKEN=flume-dev-token
      - OPENAI_API_KEY=${OPENAI_API_KEY:-""}
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD:-flume-elastic-pass}
    command: ["uv", "run", "python", "src/docker_bootstrap.py"]

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: flume-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=true
      - xpack.security.http.ssl.enabled=false
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD:-flume-elastic-pass}
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -u elastic:${ELASTIC_PASSWORD:-flume-elastic-pass} -s http://localhost:9200 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: flume-dashboard
    depends_on:
      elasticsearch:
        condition: service_healthy
      openbao:
        condition: service_healthy
      bootstrap:
        condition: service_completed_successfully
    volumes:
      - .:/app
    ports:
      - "${DASHBOARD_PORT:-8765}:8765"
    environment:
      - FLUME_CONFIG=/app/config.toml
      - PYTHONPATH=/app/src
      - UV_PROJECT_ENVIRONMENT=/opt/venv
      - LOCAL_EXO_BASE_URL=${LOCAL_EXO_BASE_URL:-http://host.docker.internal:52415/v1}
      - LOCAL_OLLAMA_BASE_URL=${LOCAL_OLLAMA_BASE_URL:-http://host.docker.internal:11434/v1}
      - FLUME_AUTO_START_WORKERS=${FLUME_AUTO_START_WORKERS:-1}
      - FLUME_OPENBAO_ADDR=http://openbao:8200
    command: ["uv", "run", "python", "src/dashboard/server.py"]

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      elasticsearch:
        condition: service_healthy
      openbao:
        condition: service_healthy
      bootstrap:
        condition: service_completed_successfully
    volumes:
      - .:/app
      - ${FLUME_WORKSPACE:-./workspace}:/workspace
    environment:
      - FLUME_CONFIG=/app/config.toml
      - PYTHONPATH=/app/src
      - UV_PROJECT_ENVIRONMENT=/opt/venv
      - LOCAL_EXO_BASE_URL=${LOCAL_EXO_BASE_URL:-http://host.docker.internal:52415/v1}
      - LOCAL_OLLAMA_BASE_URL=${LOCAL_OLLAMA_BASE_URL:-http://host.docker.internal:11434/v1}
      - FLUME_OPENBAO_ADDR=http://openbao:8200
    command: ["uv", "run", "python", "src/worker-manager/manager.py"]
    deploy:
      mode: replicated
      replicas: 2

volumes:
  es_data:
  openbao_data:
