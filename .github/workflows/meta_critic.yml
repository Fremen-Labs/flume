name: Autonomous Meta-Critic

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  criticize:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install uv
          uv sync

      - name: Run Meta-Critic Review
        env:
          LLM_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          LLM_PROVIDER: gemini
          LLM_MODEL: gemini-2.5-pro
        run: |
          echo "Triggering AI Critic on PR Diff natively..."
          uv run python src/worker-manager/meta_critic.py --github-pr ${{ github.event.pull_request.number }}
