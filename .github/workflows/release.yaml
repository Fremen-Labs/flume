name: Release Flume CLI
on:
  release:
    types: [published]

jobs:
  build-and-release:
    name: Build & Release Flume Matrix
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: darwin
            arch: arm64
            name: flume-darwin-arm64
          - os: linux
            arch: amd64
            name: flume-linux-amd64
          - os: windows
            arch: amd64
            name: flume-windows-amd64.exe

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          
      - name: Build Binary
        run: |
          GOOS=${{ matrix.os }} GOARCH=${{ matrix.arch }} go build -o ${{ matrix.name }} cmd/flume/main.go
          
      - name: Attach Assets to Release
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ matrix.name }}
