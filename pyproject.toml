[project]
name = "flume"
version = "0.1.0"
description = "Autonomous Engineering Frontier"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "flask",
    "flask-cors",
    "elasticsearch",
    "requests",
    "pydantic",
    "pydantic-settings",
    "click",
    "toml>=0.10.2",
    "websockets>=12",
]

[project.optional-dependencies]
dev = [
    "pytest",
    "pytest-asyncio",
    "mypy",
    "ruff"
]

[project.scripts]
flume = "flume_cli.cli:cli"

[tool.setuptools.packages.find]
include = ["flume_cli*"]

[build-system]
requires = ["setuptools>=42", "wheel"]
build-backend = "setuptools.build_meta"
